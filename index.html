<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkbox</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div class="container">
        <div class="center">
            <div class="content">
                <div>
                    <h1><span><img src="./img/icon.svg" alt=""></span>Модель</h1>
                    <form class="Text" action="">
                        <input class="car-search" type="text" required placeholder="Введите модель шины">
                    </form>
                </div>
                <div class="fdc">
                    <div class="flex items space">
                        <form class="Checkbox">
                            <label class="flex items">
                                <input class="visually-hidden" type="checkbox">
                                <span class="check-style"></span>
                                <span>ALINA</span>
                            </label>
                        </form>

                        <form class="Checkbox">
                            <label class="flex items">
                                <input class="visually-hidden" type="checkbox">
                                <span class="check-style"></span>
                                <span>BLIWWAS</span>
                            </label>
                        </form>
                    </div>
                    <div style="margin-top: 30px;" class="flex items space">
                        <form class="Checkbox">
                            <label class="flex items">
                                <input class="visually-hidden" type="checkbox">
                                <span class="check-style"></span>
                                <span>FORCE <br> Moode</span>
                            </label>
                        </form>

                        <form class="Checkbox">
                            <label class="flex items">
                                <input class="visually-hidden" type="checkbox">
                                <span class="check-style"></span>
                                <span>ICE Gide</span>
                            </label>
                        </form>
                    </div>
                    <h4>Показать еще</h4>
                </div>
                <hr>
                <div style="margin-top: 40px;" class="radio">
                    <h1 class="flex items">Технология <span><img style="margin-right: 15px;" src="./img/ask.svg"
                                alt=""></span></h1>
                    <form action="">
                        <div style="margin-top: 20px;" class="flex space items">
                            <label for="">
                                <input type="radio" name="choose">
                                <span class="radio-style"></span>
                                Да
                            </label>
                            <label for="">
                                <input type="radio" name="choose">
                                <span class="radio-style"></span>
                                Нет
                            </label>
                        </div>
                    </form>

                </div>
                <hr>
                <div style="margin-top: 40px; margin-bottom: 40px;">
                    <h1><span><img src="./img/icon.svg" alt=""></span>Страны</h1>

                </div>
                
                <div class="fdc">
                    <div class="flex items space">
                        <form class="Checkbox">
                            <label class="flex items">
                                <input class="visually-hidden" type="checkbox">
                                <span class="check-style"></span>
                                <span>Россия</span>
                            </label>
                        </form>

                        <form class="Checkbox">
                            <label class="flex items">
                                <input class="visually-hidden" type="checkbox">
                                <span class="check-style"></span>
                                <span>Германия</span>
                            </label>
                        </form>
                    </div>
                    <div style="margin-top: 30px;" class="flex items space">
                        <form class="Checkbox">
                            <label class="flex items">
                                <input class="visually-hidden" type="checkbox">
                                <span class="check-style"></span>
                                <span>Россия</span>
                            </label>
                        </form>

                        <form class="Checkbox">
                            <label class="flex items">
                                <input class="visually-hidden" type="checkbox">
                                <span class="check-style"></span>
                                <span>Германия</span>
                            </label>
                        </form>
                    </div>
                    <h4>Показать еще</h4>
                </div>
            </div>
        </div>
    </div>
    </div>
</body>

</html>
